spring.application.name=simple-bank-app
# Render supplies PORT at runtime; local development continues to use port 8080.
server.address=0.0.0.0
server.port=${PORT:8080}

# Paste your MongoDB Atlas URI here, or set the MONGODB_URI environment variable.
# Example: mongodb+srv://<username>:<db_password>@<cluster-url>/?appName=<app-name>
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/simplebank}
# Logical MongoDB database name used by Spring Data repositories.
spring.mongodb.database=simplebank

# JWT signing secret. For production, set JWT_SECRET to a random 32+ character value instead of hardcoding it here.
# Leave it blank for local development; the app will generate a temporary secret each time it starts.
security.jwt.secret=${JWT_SECRET:}
# Token lifetime in minutes. Shorter lifetimes reduce risk if a token is copied.
security.jwt.expiration-minutes=${JWT_EXPIRATION_MINUTES:60}

# Demo admin login for the React Admin page.
# Username: admin
# Password: admin123
app.demo-admin.enabled=true
app.demo-admin.username=admin
app.demo-admin.password=admin123
